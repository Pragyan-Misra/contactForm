<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Galaxy Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="form-box">
            <h2>Get In Touch ✨</h2>
            <form id="contactForm" action="send.php" method="POST">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter your full name">
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="email" placeholder="your@email.com">
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" id="phone" placeholder="1234567890">
                    <small class="error"></small>
                </div>

                <div class="input-group">
                    <label>Your Message</label>
                    <textarea name="message" id="message" rows="4" placeholder="Tell us more..."></textarea>
                    <small class="error"></small>
                </div>

                <button type="submit">Send Message 🚀</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
